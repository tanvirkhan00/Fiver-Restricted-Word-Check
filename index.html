<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fiverr Safety Checker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <header>
      <h1>Fiverr Safety Checker</h1>
      <p>Detect risky words in your message</p>
    </header>

    <div class="editor">
      <textarea id="inputText" oninput="checkText()" placeholder="Type or paste your message here..."></textarea>

      <div id="outputText" class="output"></div>
    </div>

    <div class="sidebar">
      <h3>Detected Issues</h3>
      <ul id="detectedList"></ul>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
